{% extends "base.html" %}

{% block content %}
<section class="content-section">
    <div class="detail-card">
        <h2>{{ recipe.name }}</h2>

        <div class="rating-badge">{{ recipe.rating }}/10</div>

        {% if recipe.description %}
            <p><strong>Notes:</strong> {{ recipe.description }}</p>
        {% endif %}

        {% if photos %}
            <h3>Photos</h3>
            <div class="card-grid">
                {% for photo in photos %}
                    <div class="card">
                        <img
                            class="detail-image"
                            src="{{ url_for('static', filename='uploads/' + photo.filename) }}"
                            alt="{{ recipe.name }}"
                        >
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>No photos yet.</p>
        {% endif %}

        <div style="margin-top: 20px;">
            <a class="button" href="{{ url_for('index') }}">Back Home</a>
        </div>
    </div>
</section>
{% endblock %}
