<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Rater</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .site-subtitle {
            margin: 6px 0 0 0;
            color: #93c5fd;
            font-weight: 600;
        }

        .header-nav-row {
            margin-top: 16px;
        }

        .desktop-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .mobile-menu-wrap {
            display: none;
        }

        .menu-toggle {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            margin-top: 10px;
            background: white;
            border-radius: 12px;
            padding: 10px;
        }

        .mobile-menu.open {
            display: grid;
            gap: 10px;
        }

        .mobile-menu .button {
            width: 100%;
        }

        .logo-img {
            height: 95px;   /* Bigger, clean */
            width: auto;
            display: block;
        }

        @media screen and (max-width: 768px) {
            .desktop-nav {
                display: none;
            }

            .mobile-menu-wrap {
                display: block;
            }

            .logo-img {
                height: 70px;
            }
        }
    </style>
</head>

<body>

<header class="site-header">
    <div class="header-inner">

        <!-- LOGO -->
        <a href="{{ url_for('index') }}">
            <img
                class="logo-img"
                src="{{ url_for('static', filename='images/logo.png') }}"
                alt="Dinner Rater Logo"
            >
        </a>

        <p class="site-subtitle">Himpele Family Favorites</p>

        <div class="header-nav-row">

            <!-- DESKTOP MENU -->
            <nav class="desktop-nav">
                <a class="button" href="{{ url_for('index') }}">Home</a>
                <a class="button" href="{{ url_for('restaurants_list') }}">Restaurants</a>
                <a class="button" href="{{ url_for('recipes_list') }}">Recipes</a>
                <a class="button" href="{{ url_for('add_restaurant') }}">Add Restaurant</a>
                <a class="button" href="{{ url_for('add_recipe') }}">Add Recipe</a>
            </nav>

            <!-- MOBILE MENU -->
            <div class="mobile-menu-wrap">
                <button onclick="toggleMobileMenu()" class="menu-toggle">☰</button>

                <div id="mobileMenu" class="mobile-menu">
                    <a class="button" href="{{ url_for('index') }}">Home</a>
                    <a class="button" href="{{ url_for('restaurants_list') }}">Restaurants</a>
                    <a class="button" href="{{ url_for('recipes_list') }}">Recipes</a>
                    <a class="button" href="{{ url_for('add_restaurant') }}">Add Restaurant</a>
                    <a class="button" href="{{ url_for('add_recipe') }}">Add Recipe</a>
                </div>
            </div>

        </div>
    </div>
</header>

<main class="page-wrap">
    {% block content %}{% endblock %}
</main>

<script>
function toggleMobileMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("open");
}
</script>

</body>
</html>
