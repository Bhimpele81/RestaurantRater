<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Rater</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .site-subtitle {
            margin: 5px 0 0 0;
            color: #0f2a44;
        }

        .header-nav-row {
            margin-top: 14px;
        }

        .desktop-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mobile-menu-wrap {
            display: none;
        }

        .menu-toggle {
            width: 100%;
            background: #0f2a44;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            margin-top: 10px;
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        .mobile-menu.open {
            display: grid;
            gap: 10px;
        }

        .mobile-menu .button {
            display: block;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        @media screen and (max-width: 768px) {
            .header-inner {
                text-align: center;
            }

            .desktop-nav {
                display: none;
            }

            .mobile-menu-wrap {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1><a href="{{ url_for('index') }}">Dinner Rater</a></h1>
            <p class="site-subtitle">Himpele Family Favorites</p>

            <div class="header-nav-row">
                <nav class="desktop-nav">
                    <a class="button" href="{{ url_for('index') }}">Home</a>
                    <a class="button" href="{{ url_for('restaurants_list') }}">Restaurants</a>
                    <a class="button" href="{{ url_for('recipes_list') }}">Recipes</a>
                    <a class="button" href="{{ url_for('add_restaurant') }}">Add Restaurant</a>
                    <a class="button" href="{{ url_for('add_recipe') }}">Add Recipe</a>
                </nav>

                <div class="mobile-menu-wrap">
                    <button class="menu-toggle" type="button" onclick="toggleMobileMenu()">
                        Menu
                    </button>

                    <nav id="mobileMenu" class="mobile-menu">
                        <a class="button" href="{{ url_for('index') }}">Home</a>
                        <a class="button" href="{{ url_for('restaurants_list') }}">Restaurants</a>
                        <a class="button" href="{{ url_for('recipes_list') }}">Recipes</a>
                        <a class="button" href="{{ url_for('add_restaurant') }}">Add Restaurant</a>
                        <a class="button" href="{{ url_for('add_recipe') }}">Add Recipe</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById("mobileMenu");
            menu.classList.toggle("open");
        }
    </script>
</body>
</html>
