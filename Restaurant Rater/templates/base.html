<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Rater</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .top-nav {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top-nav .button {
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .header-inner h1 {
                font-size: 1.8rem;
                line-height: 1.2;
            }

            .top-nav {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                width: 100%;
            }

            .top-nav .button {
                width: 100%;
                text-align: center;
                padding: 12px 10px;
                box-sizing: border-box;
            }
        }

        @media (max-width: 420px) {
            .top-nav {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1><a href="{{ url_for('index') }}">Dinner Rater</a></h1>
            <p style="margin: 5px 0 0 0; color: #0f2a44;">Himpele Family Favorites</p>

            <nav class="top-nav">
                <a class="button" href="{{ url_for('index') }}">Home</a>
                <a class="button" href="{{ url_for('restaurants_list') }}">Restaurants</a>
                <a class="button" href="{{ url_for('recipes_list') }}">Recipes</a>
                <a class="button" href="{{ url_for('add_restaurant') }}">Add Restaurant</a>
                <a class="button" href="{{ url_for('add_recipe') }}">Add Recipe</a>
            </nav>
        </div>
    </header>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
