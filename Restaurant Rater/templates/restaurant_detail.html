{% extends "base.html" %}

{% block content %}
<section class="content-section">
    <div class="detail-card">
        {% if restaurant %}
            <h2>{{ restaurant.name }}</h2>

            {% if restaurant.image_data %}
                <div style="margin: 18px 0;">
                    <img
                        src="{{ restaurant.image_data }}"
                        alt="{{ restaurant.name }}"
                        class="detail-image"
                        style="width: 100%; max-height: 320px; object-fit: cover; border-radius: 12px;"
                    >
                </div>
            {% elif restaurant.image_filename %}
                <div style="margin: 18px 0;">
                    <img
                        src="{{ url_for('static', filename='uploads/' + restaurant.image_filename) }}"
                        alt="{{ restaurant.name }}"
                        class="detail-image"
                        style="width: 100%; max-height: 320px; object-fit: cover; border-radius: 12px;"
                    >
                </div>
            {% endif %}

            {% if restaurant.effective_rating is not none %}
                <p>
                    <span class="rating-badge">{{ restaurant.effective_rating }}/10
