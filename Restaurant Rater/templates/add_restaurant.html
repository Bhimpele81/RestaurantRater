{% extends "base.html" %}

{% block content %}
<section class="content-section">
    <div class="form-card">
        <h2>Add Restaurant</h2>
        <p>Save a restaurant, what you tried, and where it was.</p>

        <form method="POST" enctype="multipart/form-data">
            <label for="name">Restaurant Name</label>
            <input type="text" id="name" name="name" required>

            <label for="category">Cuisine</label>
            <select id="category" name="category" required>
                <option value="">Select a cuisine</option>
                {% for cuisine in cuisines %}
                    <option value="{{ cuisine }}">{{ cuisine }}</option>
                {% endfor %}
            </select>

            <label for="city">City</label>
            <input
                type="text"
                id="city"
                name="city"
                placeholder="Philadelphia"
                required
            >

            <label for="state">State</label>
            <input
                type="text"
                id="state"
                name="state"
                placeholder="PA"
                required
            >

            <label for="description">Notes</label>
            <textarea
                id="description"
                name="description"
                rows="5"
                placeholder="What made this place memorable?"
            ></textarea>

            <label for="dishes_tried">Dishes Tried</label>
            <input
                type="text"
                id="dishes_tried"
                name="dishes_tried"
                placeholder="Pizza, salad, wings"
            >

            <label for="attendees">Who Was There</label>
            <input
                type="text"
                id="attendees"
                name="attendees"
                placeholder="Family, friends, coworkers"
            >

            <label for="visit_date">Visit Date</label>
            <input type="date" id="visit_date" name="visit_date">

            <label for="rating">Rating (1.0 to 10.0)</label>
            <input
                type="number"
                id="rating"
                name="rating"
                min="1"
                max="10"
                step="0.1"
                placeholder="8.5"
                required
            >

            <label for="image">Upload Photo</label>
            <input type="file" id="image" name="image" accept="image/*">

            <div style="margin-top: 18px;">
                <button type="submit">Save Restaurant</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
