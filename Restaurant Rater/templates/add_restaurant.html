    {% extends "base.html" %}

    {% block content %}
    <section class="content-section">
        <div class="form-card">
            <p class="section-kicker">Add Restaurant</p>
            <h2>Save a new restaurant</h2>
            <p class="muted-text">
                Track where you went, what you tried, and how much your family liked it.
            </p>

            <form method="POST" enctype="multipart/form-data">
                <label for="name">Restaurant Name</label>
                <input type="text" id="name" name="name" required>

                <label for="category">Cuisine Style</label>
                <select id="category" name="category" required>
                    <option value="">Select a cuisine style</option>
                    {% for cuisine in cuisines %}
                        <option value="{{ cuisine }}">{{ cuisine }}</option>
                    {% endfor %}
                </select>

                <label for="dishes_tried">Dishes Tried</label>
                <textarea
                    id="dishes_tried"
                    name="dishes_tried"
                    rows="3"
                    placeholder="Example: chicken tikka masala, garlic naan, mango lassi"
                ></textarea>

                <label for="description">Notes / Description</label>
                <textarea
                    id="description"
                    name="description"
                    rows="4"
                    placeholder="What stood out? Was it family-friendly? Would you go back?"
                ></textarea>

                <label for="rating">Rating (1.0 to 10.0)</label>
                <input
                    type="number"
                    id="rating"
                    name="rating"
                    min="1"
                    max="10"
                    step="0.1"
                    placeholder="8.5"
                    required
                >

                <label for="image">Upload Photo</label>
                <input type="file" id="image" name="image" accept="image/*">

                <button type="submit">Save Restaurant</button>
            </form>
        </div>
    </section>
    {% endblock %}
