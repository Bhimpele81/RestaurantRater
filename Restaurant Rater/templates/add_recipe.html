{% extends "base.html" %}

{% block content %}
<section class="content-section">
    <div class="form-card">
        <h2>Add Recipe</h2>
        <p>Save a family favorite and add photos.</p>

        <form method="POST" enctype="multipart/form-data">
            <label for="name">Recipe Name</label>
            <input type="text" id="name" name="name" required>

            <label for="description">Notes</label>
            <textarea
                id="description"
                name="description"
                placeholder="Why do you like it? Any family notes?"
            ></textarea>

            <label for="rating">Rating (1.0 to 10.0)</label>
            <input
                type="number"
                id="rating"
                name="rating"
                min="1"
                max="10"
                step="0.1"
                placeholder="9.0"
                required
            >

            <label for="images">Upload Photo(s)</label>
            <input type="file" id="images" name="images" accept="image/*" multiple>

            <div style="margin-top: 18px;">
                <button type="submit">Save Recipe</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
